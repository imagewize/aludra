<!--
  Review-avatar placeholder for aludra/review-profiles (is-style-avatars).

  "eos-face" icon by EOS Icons, via Blade UI Kit (blade-icons) — MIT License.
  Source: https://blade-ui-kit.com/blade-icons/eos-face
  See the Credits section of readme.txt.

  Replaces a hand-drawn front-facing bust that was also drawn in cool greys
  (#e5e7eb/#9ca3af) — the exact leak the palette contract set out to remove.
  Recoloured here into the same warm sand/terracotta family as the rest of
  Aludra's bundled art, so it sits in a warm palette without reading as a
  missing image.

  No background disc: the icon's own face interior is negative space, so
  leaving the backdrop transparent lets the avatar take on whatever surface it
  is dropped onto — the block's `is-style-avatars` background, a tinted spine
  section, or a dark style variation — instead of stamping one fixed cream
  circle onto all of them.

  Deliberately faceless-generic: it reads as "a person, photo pending" and
  never as a specific person the site is implying is a client.
-->
